# urlsup configuration file
# Generated by the configuration wizard

# Basic settings
timeout = 30
allow_timeout = false
file_types = ["md", "markdown"]

# Performance and retry settings
retry_attempts = 2
retry_delay = 2000
rate_limit_delay = 300

